<!DOCTYPE html>

<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="image-box">

        <!-- Background -->
        <img src="images/BG.png" class="bg">

        <!-- Email Content -->
        <img src="images/Who knows_ Maybe I’ll email you back.png" class="emailuback">

        <img src="images/Email me at.png" class="emailmeat">

        <img src="images/gmail.png" class="gmail">

        <img src="images/E-mail.png" class="email">

        <!-- Banner -->
        <img src="images/banner.png" class="banner">

        <!-- Current Page -->
        <img src="images/E-mail Button-Grey.png" class="nonemail">

        <!-- Home Button -->
        <a href="index.html">
            <img src="images/Home Button-Purple.png" class="homebutton">
        </a>

        <!-- Star -->
        <a onclick="return starcheck()" href="StarPage.html">
            <img src="images/Purple Star.png" class="star">
        </a>

    </div>

    <script>
        function starcheck() {
            return confirm("You found the Star! Want to see what happens next?");
        }
    </script>

</body>
</html>
